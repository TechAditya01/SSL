<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiksha Sagar Library - Seat Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom smooth pulse background animation to give an "Ocean" vibe */
        @keyframes ocean-pulse {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .animated-bg {
            background: linear-gradient(-45deg, #020617, #0f172a, #082f49, #0f172a);
            background-size: 400% 400%;
            animation: ocean-pulse 15s ease infinite;
        }
    </style>
</head>
<body class="animated-bg text-slate-100 min-h-screen flex flex-col items-center justify-center p-4 font-sans selection:bg-cyan-500 selection:text-slate-900">

    <div class="w-full max-w-xl bg-slate-900/60 border border-slate-800/80 p-8 rounded-3xl shadow-[0_0_50px_rgba(6,182,212,0.15)] backdrop-blur-xl text-center relative overflow-hidden transition-all duration-500 hover:border-cyan-500/30">
        
        <div class="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r from-transparent via-cyan-400 to-transparent"></div>

        <header class="mb-8">
            <h1 class="text-3xl sm:text-4xl font-black tracking-tight mb-1 bg-gradient-to-r from-cyan-400 via-sky-400 to-blue-500 bg-clip-text text-transparent drop-shadow-sm">
                SHIKSHA SAGAR LIBRARY
            </h1>
            <p class="text-xs uppercase tracking-[0.25em] font-bold text-cyan-500/80">
                ~ Ocean of Learning ~
            </p>
            <div class="w-24 h-[1px] bg-slate-800 mx-auto mt-4"></div>
        </header>

        <div id="login-screen" class="space-y-6 py-4">
            <p class="text-slate-300 text-sm sm:text-base leading-relaxed">
                A Seat booking platform with "FIRST-COME, FIRST-SERVE" service !!.
            </p>
            <button id="btn-login" class="w-full py-3.5 px-6 bg-white text-slate-950 font-extrabold rounded-xl transition-all duration-300 hover:bg-cyan-400 hover:text-slate-950 hover:scale-[1.02] active:scale-[0.98] shadow-lg shadow-white/5 hover:shadow-cyan-400/20 flex items-center justify-center gap-3">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/></svg>
                Continue with Google
            </button>
        </div>

        <div id="voting-screen" class="hidden space-y-6">
            <p id="user-email" class="text-xs text-cyan-400 font-semibold bg-cyan-950/40 border border-cyan-900/40 inline-block px-3 py-1 rounded-full"></p>
            <p class="text-slate-300 text-sm">Apni manpasand seat select karke niche finalize karein:</p>
            
            <div class="flex justify-center gap-5 text-xs font-medium bg-slate-950/40 p-3 rounded-xl border border-slate-800/60">
                <span class="flex items-center gap-1.5"><span class="w-3 h-3 bg-slate-800 border border-slate-700 rounded-md"></span> Available</span>
                <span class="flex items-center gap-1.5"><span class="w-3 h-3 bg-red-950/40 border border-red-800/60 rounded-md"></span> Taken</span>
                <span class="flex items-center gap-1.5"><span class="w-3 h-3 bg-gradient-to-br from-cyan-400 to-blue-500 rounded-md animate-pulse"></span> Selected</span>
            </div>

            <div id="seat-grid" class="grid grid-cols-5 gap-3 my-6 max-h-[320px] overflow-y-auto pr-1 scrollbar-thin scrollbar-thumb-slate-800"></div>

            <button id="btn-submit" disabled class="w-full py-3.5 px-6 bg-slate-800 text-slate-500 font-bold rounded-xl cursor-not-allowed transition-all duration-300 border border-slate-700/50">
                Select an Available Seat
            </button>
        </div>

        <div id="voted-screen" class="hidden space-y-5 py-6 transition-all duration-500 transform translate-y-0">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 rounded-full text-4xl mb-2 animate-bounce">
                ✓
            </div>
            <h2 class="text-2xl font-black text-emerald-400 tracking-tight">Seat Confirmed!</h2>
            <p id="success-msg" class="text-slate-300 text-sm leading-relaxed px-4"></p>
            <div class="text-xs text-slate-500 pt-2">Powered by Shiksha Sagar Tech Team</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5r9XHLDeCqguZ-DBm_xS6CBBfsjamOrI",
            authDomain: "ss-library-d868e.firebaseapp.com",
            projectId: "ss-library-d868e",
            storageBucket: "ss-library-d868e.firebasestorage.app",
            messagingSenderId: "867659083193",
            appId: "1:867659083193:web:615c2c9ffe04da01821a68"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const loginScreen = document.getElementById('login-screen');
        const votingScreen = document.getElementById('voting-screen');
        const votedScreen = document.getElementById('voted-screen');
        const seatGrid = document.getElementById('seat-grid');
        const btnLogin = document.getElementById('btn-login');
        const btnSubmit = document.getElementById('btn-submit');
        const userEmailTxt = document.getElementById('user-email');
        const successMsg = document.getElementById('success-msg');

        let currentUser = null;
        let selectedSeat = null;
        let globalSeats = {};
        let globalUsers = {};

        const stateDocRef = doc(db, "shiksha_sagar_bookings", "live_state");
        
        onSnapshot(stateDocRef, (docSnap) => {
            if (docSnap.exists()) {
                globalSeats = docSnap.data().seats || {};
                globalUsers = docSnap.data().users || {};
            }
            
            if (currentUser && globalUsers[currentUser.uid]) {
                showSuccessScreen(globalUsers[currentUser.uid]);
            } else {
                renderSeats();
            }
        });

        // Combined logic for testing seats (1-10) + final seats (39-73)
        function renderSeats() {
            seatGrid.innerHTML = '';
            
            const allSeats = [];
            for (let i = 1; i <= 10; i++) allSeats.push(i);
            for (let i = 39; i <= 73; i++) allSeats.push(i);

            allSeats.forEach(i => {
                const seat = document.createElement('div');
                seat.innerText = i;
                
                if (globalSeats[i]) {
                    seat.className = "p-3 bg-red-950/30 border border-red-900/40 text-red-400/40 rounded-xl font-bold cursor-not-allowed flex items-center justify-center text-base line-through opacity-60";
                } else if (selectedSeat === i) {
                    seat.className = "p-3 bg-gradient-to-br from-cyan-400 to-blue-500 text-slate-950 border-none rounded-xl font-black cursor-pointer flex items-center justify-center text-lg shadow-lg shadow-cyan-400/30 scale-105 transition-all duration-200 animate-pulse";
                    seat.onclick = () => selectSeat(i);
                } else {
                    seat.className = "p-3 bg-slate-800/70 border border-slate-700/60 rounded-xl font-bold cursor-pointer transition-all duration-200 hover:bg-slate-700 hover:border-cyan-500/40 hover:text-cyan-400 active:scale-95 flex items-center justify-center text-base";
                    seat.onclick = () => selectSeat(i);
                }
                seatGrid.appendChild(seat);
            });
        }

        function selectSeat(seatNum) {
            selectedSeat = seatNum;
            renderSeats();
            btnSubmit.disabled = false;
            btnSubmit.innerText = `Final Submit: Lock Seat ${seatNum}`;
            btnSubmit.className = "w-full py-3.5 px-6 bg-gradient-to-r from-cyan-400 via-sky-500 to-blue-600 text-slate-950 font-extrabold rounded-xl transition-all duration-300 shadow-xl shadow-cyan-500/10 active:scale-[0.98] cursor-pointer hover:opacity-95";
        }

        function showSuccessScreen(seatNum) {
            loginScreen.classList.add('hidden');
            votingScreen.classList.add('hidden');
            votedScreen.classList.remove('hidden');
            successMsg.innerHTML = `Aapka response secure ho chuka hai. Aapko <strong class="text-cyan-400 font-bold text-lg">Seat No. ${seatNum}</strong> allot ki gayi hai.`;
        }

        btnLogin.onclick = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                currentUser = result.user;
                
                if (globalUsers[currentUser.uid]) {
                    showSuccessScreen(globalUsers[currentUser.uid]);
                } else {
                    loginScreen.classList.add('hidden');
                    userEmailTxt.innerText = `${currentUser.email}`;
                    votingScreen.classList.remove('hidden');
                    renderSeats();
                }
            } catch (error) {
                alert("Login cancelled or network issue. Please try again!");
            }
        };

        btnSubmit.onclick = async () => {
            if (!selectedSeat || !currentUser) return;
            
            btnSubmit.disabled = true;
            btnSubmit.innerText = "Processing secure lock...";

            try {
                await runTransaction(db, async (transaction) => {
                    const sfDoc = await transaction.get(stateDocRef);
                    let seats = {};
                    let users = {};
                    
                    if (sfDoc.exists()) {
                        seats = sfDoc.data().seats || {};
                        users = sfDoc.data().users || {};
                    }
                    
                    if (users[currentUser.uid]) {
                        throw "Aapne pehle se ek seat book kar li hai!";
                    }
                    if (seats[selectedSeat]) {
                        throw "Oops! Yeh seat abhi aapse ek fraction of second pehle kisi aur ne lock kar li. Kripya dusri seat chunein.";
                    }
                    
                    seats[selectedSeat] = currentUser.email;
                    users[currentUser.uid] = selectedSeat;
                    
                    transaction.set(stateDocRef, { seats, users }, { merge: true });
                });
                
                showSuccessScreen(selectedSeat);
            } catch (e) {
                alert(e);
                selectedSeat = null;
                btnSubmit.innerText = "Select an Available Seat";
                btnSubmit.className = "w-full py-3.5 px-6 bg-slate-800 text-slate-500 font-bold rounded-xl cursor-not-allowed transition-all border border-slate-700/50";
                renderSeats();
            }
        };
    </script>
</body>
</html>
